version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: store_ratings
    ports:
      - "5432:5432"
    volumes:
      - store_ratings_data:/var/lib/postgresql/data

volumes:
  store_ratings_data:
